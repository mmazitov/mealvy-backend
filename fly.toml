# fly.toml app configuration file generated for mealvy-backend on 2026-03-25T12:05:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mealvy-backend'
primary_region = 'ams'

[build]


[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = '30s'
  interval = '15s'
  method = 'GET'
  timeout = '5s'
  path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
